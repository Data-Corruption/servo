{{define "page_start"}}
<!DOCTYPE html>
<html lang="en"{{ if .ForcedTheme }} data-theme="{{ .ForcedTheme }}" data-theme-forced{{ end }}>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ .Title }}</title>
        <meta name="description" content="Application dashboard">
        <link rel="icon" href="{{ .Favicon }}">
        <link rel="stylesheet" href="{{ .CSS }}">
        <script src="{{ .JS }}"></script>
    </head>
    <body class="min-h-screen bg-base-100">
        <!-- Click Blocker - prevents interactions during async operations -->
        <dialog id="click-blocker" class="m-0 h-screen w-screen max-h-screen max-w-[100vw] cursor-wait border-none bg-transparent p-0 outline-none"></dialog>
        <!-- Error Modal -->
        <dialog id="error-modal" class="modal">
            <div class="modal-box">
                <h3 class="font-bold text-lg text-error">Error</h3>
                <p id="error-modal-message" class="py-4 text-base-content/70">An error occurred.</p>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>
        <!-- Confirm Modal -->
        <dialog id="confirm-modal" class="modal">
            <div class="modal-box">
                <h3 id="confirm-modal-title" class="font-bold text-lg">Confirm</h3>
                <p id="confirm-modal-message" class="py-4 text-base-content/70">Are you sure?</p>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-ghost">Cancel</button>
                    </form>
                    <button id="confirm-modal-btn" class="btn btn-primary">Confirm</button>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>
        {{end}}
        {{define "page_end"}}
    </body>
</html>
{{end}}
