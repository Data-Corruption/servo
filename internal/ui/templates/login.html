{{template "page_start" .}}
{{ if .HasBackground }}
<!-- Blurred background layer. No negative z-index (would hide behind the
     body's bg fill); the relative content below paints over it instead. -->
<div aria-hidden="true" class="fixed inset-0 bg-cover bg-center pointer-events-none"
    style="background-image: url('/bg/login');{{ if .BackgroundBlur }} filter: blur({{ .BackgroundBlur }}px); transform: scale(1.06);{{ end }}"></div>
{{ end }}
<!-- Stealth login: no title, no branding, no chrome. Just a password field. -->
<div class="relative min-h-screen flex items-center justify-center p-4
    {{ if eq .ContentAlign "left" }}lg:justify-start lg:pl-16{{ else if eq .ContentAlign "right" }}lg:justify-end lg:pr-16{{ end }}">
    <div class="w-full max-w-sm space-y-4">
        {{ if .Error }}
        <div role="alert" class="alert alert-error text-sm py-2 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg"
                 class="stroke-current shrink-0 h-4 w-4"
                 fill="none"
                 viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>{{ .Error }}</span>
        </div>
        {{ end }}
        {{ if .NoCredentials }}
        <div role="alert" class="alert alert-info text-sm py-2 shadow-sm">
            <span>No credentials configured yet. On the server, run:<br>
                <code class="font-mono">{{ .AppName }} password add --label admin</code></span>
        </div>
        {{ end }}
        <form method="POST" action="/login" class="join w-full shadow-sm">
            <input type="password"
                   name="password"
                   class="input input-bordered join-item w-full"
                   placeholder="Tell me secrets..."
                   aria-label="Password"
                   required
                   autofocus />
            <button type="submit" class="btn btn-primary join-item" aria-label="Unlock">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </form>
    </div>
</div>
{{template "page_end" .}}
