{{template "page_start" .}}
<!-- Main Content -->
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm space-y-6">
        <!-- Header -->
        <div class="flex flex-col items-center justify-center -mt-8">
            <span class="text-4xl">🌱</span>
        </div>
        <!-- Login Box -->
        <div class="bg-base-100 border-base-300 border rounded-box p-6 shadow-sm">
            {{ if .Error }}
            <div role="alert" class="alert alert-error text-sm py-2 mb-5">
                <svg xmlns="http://www.w3.org/2000/svg"
                     class="stroke-current shrink-0 h-4 w-4"
                     fill="none"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>{{ .Error }}</span>
            </div>
            {{ end }}
            {{ if .NoCredentials }}
            <div role="alert" class="alert alert-info text-sm py-2 mb-5">
                <span>No credentials configured yet. On the server, run:<br>
                    <code class="font-mono">{{ .AppName }} password add --label admin</code></span>
            </div>
            {{ end }}
            <form method="POST" action="/login" class="flex flex-col gap-5 text-sm">
                <fieldset class="fieldset">
                    <legend class="fieldset-legend text-base">Password</legend>
                    <input type="password"
                           name="password"
                           class="input input-bordered w-full"
                           placeholder="Tell me secrets..."
                           required
                           autofocus />
                </fieldset>
                <button type="submit" class="btn btn-primary w-full">Unlock</button>
            </form>
        </div>
        <!-- Theme Toggle (Minimalist) -->
        <div class="flex justify-center text-sm">
            <label class="label cursor-pointer gap-2 opacity-60 hover:opacity-100 transition-opacity">
                <span>Dark Mode</span>
                <input type="checkbox"
                       id="theme-toggle"
                       class="toggle toggle-primary toggle-sm" />
            </label>
        </div>
        <!-- Footer -->
        <div class="text-center mt-8">
            <span class="text-xs text-base-content/40">{{ .Version }}</span>
        </div>
    </div>
</div>
{{template "page_end" .}}
